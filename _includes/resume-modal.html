<script type="module" src="https://cdn.jsdelivr.net/npm/pdfjs-viewer-element/dist/pdfjs-viewer-element.js"></script>
<div id="resume-modal" class="resume-modal" onclick="if(event.target===this){closeResumeModal()}">
  <div class="resume-modal__inner">
    <div class="resume-modal__header">
      <span>{% if page.lang == 'zh' %}履歷預覽{% else %}Resume Preview{% endif %}</span>
      <button onclick="closeResumeModal()">&times;</button>
    </div>
    <div class="resume-modal__body" id="resume-viewer"></div>
    <div class="resume-modal__footer">
      <a href="/files/Resume_2026.pdf" download><i class="fas fa-download"></i> {% if page.lang == 'zh' %}下載（PDF）{% else %}Download (PDF){% endif %}</a>
    </div>
  </div>
</div>
<script>
function openResumeModal(){
  document.getElementById('resume-modal').classList.add('active');
  document.querySelector('.masthead').style.zIndex='-1';
  document.body.style.overflow='hidden';
  var viewer=document.getElementById('resume-viewer');
  if(!viewer.querySelector('pdfjs-viewer-element')){
    var el=document.createElement('pdfjs-viewer-element');
    el.setAttribute('src','/files/Resume_2026.pdf');
    el.setAttribute('viewer-extra-styles','#toolbarViewer{display:none!important}');
    el.style.cssText='width:100%;height:100%;display:block;';
    viewer.appendChild(el);
  }
}
function closeResumeModal(){
  document.getElementById('resume-modal').classList.remove('active');
  document.querySelector('.masthead').style.zIndex='';
  document.body.style.overflow='';
}
</script>
